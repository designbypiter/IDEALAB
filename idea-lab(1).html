<title>IDEA LAB — by PTR</title>

<style>
  :root{
    --bg:#ffffff;
    --ink:#0a0a0a;
    --accent:#006cf0;
    --paper:#fafaf9;
    --line:#dcdcda;
    --line-soft:#eaeae8;
    --muted:#9a9a97;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width: 600px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ---------- HEADER ---------- */
  .title-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }
  h1{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size: clamp(46px, 11vw, 68px);
    letter-spacing: 0.01em;
    text-transform:uppercase;
    margin:0;
    line-height:0.85;
  }
  .byline{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    font-weight:500;
    color:var(--muted);
    letter-spacing:0.02em;
    white-space:nowrap;
  }
  .subtitle{
    font-size:14.5px;
    color:#5a5a57;
    margin:6px 0 0;
    font-weight:400;
  }

  /* ---------- TICKET ---------- */
  .ticket{
    position:relative;
    margin-top:34px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:2px;
  }

  .ticket-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    border-bottom:1px dashed var(--line);
  }
  .ticket-no{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--muted);
  }
  .barcode{
    height:18px;
    width:70px;
    opacity:0.6;
  }
  .barcode rect{ fill: var(--ink); }

  .row{
    position:relative;
    padding:16px 20px;
    border-bottom:1px dashed var(--line-soft);
    transition: background 0.15s ease;
  }
  .row:last-of-type{
    border-bottom:none;
  }
  .row.locked{
    background: rgba(0,108,240,0.045);
  }
  .row.locked::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:3px;
    background:var(--accent);
  }

  .row-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .row-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .row.locked .row-label{ color:var(--accent); }

  .row-actions{
    display:flex;
    gap:2px;
    align-items:center;
  }
  .icon-btn{
    background:none;
    border:none;
    cursor:pointer;
    padding:4px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    border-radius:4px;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .icon-btn:hover{ background:var(--line-soft); }
  .row.locked .lock-btn{ color:var(--accent); }
  .icon-btn svg{ width:15px; height:15px; display:block; }

  .row-value{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:700;
    font-size:32px;
    line-height:1.05;
    letter-spacing:0.005em;
    margin-top:6px;
    min-height:1.1em;
  }

  .row-value.fade{
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn{
    from{ opacity:0; transform: translateY(3px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* palette swatches */
  .swatches{
    display:flex;
    gap:6px;
    margin-top:8px;
  }
  .swatch{
    width:26px; height:26px;
    border-radius:3px;
    border:1px solid rgba(0,0,0,0.08);
  }
  .palette-name{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:700;
    font-size:22px;
    margin-top:6px;
  }

  /* perforated tear-off edge */
  .perforation{
    position:relative;
    height:14px;
    background:
      radial-gradient(circle 7px at 7px 0, transparent 7px, var(--bg) 7.5px) top left,
      var(--paper);
    background-repeat: repeat-x;
    background-size: 18px 14px;
    border-bottom:1px solid var(--line);
  }

  /* ---------- CHIPS ---------- */
  .chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:18px;
    padding:0 20px;
  }
  .chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    font-weight:500;
    letter-spacing:0.02em;
    background:none;
    border:1px dashed var(--muted);
    color:#5a5a57;
    border-radius:20px;
    padding:6px 13px;
    cursor:pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .chip:hover{
    border-color:var(--accent);
    color:var(--accent);
  }

  /* ---------- GENERATE BUTTON ---------- */
  .generate-row{
    margin-top:28px;
    display:flex;
    justify-content:center;
  }
  .generate-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:3px;
    padding:15px 44px;
    cursor:pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .generate-btn:hover{ background:var(--accent); }
  .generate-btn:active{ transform: scale(0.98); }

  :focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>

const allCategories = [
  { key: "theme",        label: "Theme" },
  { key: "style",         label: "Style" },
  { key: "colorPalette",  label: "Color Palette" },
  { key: "mood",          label: "Mood" },
  { key: "artist",      label: "Music Artist" },
  { key: "projectType", label: "Project Type" },
  { key: "challenge",   label: "Challenge" },
  { key: "themePlus",   label: "Theme Plus" }
];

const defaultActive = ["theme", "style", "colorPalette", "mood"];

const state = {}; // key -> { locked: bool, value: any, active: bool }
allCategories.forEach(c => {
  state[c.key] = { locked: false, value: null, active: defaultActive.includes(c.key) };
});

let ticketNo = Math.floor(Math.random() * 900000) + 100000;

const lockIconOpen = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="1.5"/><path d="M7 11V7a5 5 0 0 1 9-3"/></svg>`;
const lockIconClosed = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="1.5"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
const closeIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>`;

function randomFrom(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function renderValue(key){
  const val = state[key].value;
  if (key === "colorPalette"){
    if (!val) return `<div class="swatches">${'<div class="swatch" style="background:#e4e4e4"></div>'.repeat(4)}</div>`;
    return `
      <div class="swatches">
        ${val.colors.map(c => `<div class="swatch" style="background:${c}"></div>`).join("")}
      </div>
      <div class="palette-name">${val.name}</div>
    `;
  }
  return `<div class="row-value fade">${val ?? "—"}</div>`;
}

function buildRow(cat){
  const s = state[cat.key];
  return `
    <div class="row ${s.locked ? 'locked' : ''}" data-key="${cat.key}">
      <div class="row-top">
        <span class="row-label">${cat.label}</span>
        <div class="row-actions">
          <button class="icon-btn remove-cat-btn" title="Remove ${cat.label}">${closeIcon}</button>
          <button class="icon-btn lock-btn" title="Lock ${cat.label}">${s.locked ? lockIconClosed : lockIconOpen}</button>
        </div>
      </div>
      ${renderValue(cat.key)}
    </div>
  `;
}

function renderTicket(){
  const active = allCategories.filter(c => state[c.key].active);
  document.getElementById("ticket-rows").innerHTML = active.map(c => buildRow(c)).join("");
  document.getElementById("ticket-no").textContent = `IDEA NO. ${String(ticketNo).padStart(6, "0")}`;
}

function renderChips(){
  const inactive = allCategories.filter(c => !state[c.key].active);
  document.getElementById("chips").innerHTML = inactive.map(c => `
    <button class="chip" data-key="${c.key}">+ ${c.label}</button>
  `).join("");
}

function attachEvents(){
  document.querySelectorAll(".lock-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const key = e.currentTarget.closest(".row").dataset.key;
      state[key].locked = !state[key].locked;
      renderTicket();
      attachEvents();
    });
  });

  document.querySelectorAll(".remove-cat-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const key = e.currentTarget.closest(".row").dataset.key;
      state[key].active = false;
      state[key].locked = false;
      renderTicket();
      renderChips();
      attachEvents();
    });
  });

  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", (e) => {
      const key = e.currentTarget.dataset.key;
      state[key].active = true;
      if (!state[key].value){
        state[key].value = randomFrom(DATA[key]);
      }
      renderTicket();
      renderChips();
      attachEvents();
    });
  });
}

function generate(){
  ticketNo = Math.floor(Math.random() * 900000) + 100000;
  allCategories.forEach(cat => {
    const s = state[cat.key];
    if (s.active && !s.locked){
      s.value = randomFrom(DATA[cat.key]);
    }
  });
  renderTicket();
  attachEvents();
}

document.getElementById("generate-btn").addEventListener("click", generate);

/* initial render */
renderTicket();
renderChips();
attachEvents();
generate();
</script>
